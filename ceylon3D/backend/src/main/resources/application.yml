spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${SUPABASE_DB_HOST:db.jgainmkjmzqjmqvsniqw.supabase.co}:${SUPABASE_DB_PORT:5432}/${SUPABASE_DB_NAME:postgres}?sslmode=require}
    username: ${SPRING_DATASOURCE_USERNAME:${SUPABASE_DB_USER:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${SUPABASE_DB_PASSWORD:}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-me-super-secret-change-me-super-secret}
  expirationMs: ${JWT_EXPIRATIONMS:86400000}

logging:
  level:
    com.university.itp: DEBUG
  file:
    name: /tmp/ceylon3d-backend.log
