spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  sql:
    init:
      mode: never

jwt:
  secret: test-secret-key-for-testing-purposes-only-32chars
  expirationMs: 86400000

logging:
  level:
    root: INFO
