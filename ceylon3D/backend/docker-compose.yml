version: '3.8'
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT}/${SUPABASE_DB_NAME}?sslmode=require
      - SPRING_DATASOURCE_USERNAME=${SUPABASE_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${SUPABASE_DB_PASSWORD}
      - JWT_SECRET=change-me-super-secret-change-me-super-secret
      - JWT_EXPIRATIONMS=86400000
    restart: unless-stopped
